server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/videoplatform}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:5}
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

r2:
  account-id: ${R2_ACCOUNT_ID:}
  access-key-id: ${R2_ACCESS_KEY_ID:}
  secret-access-key: ${R2_SECRET_ACCESS_KEY:}
  bucket-name: ${R2_BUCKET_NAME:video-platform}
  public-url: ${R2_PUBLIC_URL:https://pub-placeholder.r2.dev}

worker:
  poll-interval: ${WORKER_POLL_INTERVAL:15000}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
  ffprobe-path: ${FFPROBE_PATH:ffprobe}

logging:
  level:
    com.videoplatform: ${LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} %level [%thread] %logger{36} - %msg%n"
